name: Build Android APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Buildozer
        uses: pypa/buildozer-action@v1
        with:
          save_buildozer_config: true
          # This runs the actual build command
          command: buildozer android debug
          # Optional: point to your buildozer.spec if it's not in the root
          repository_root: .

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pantry-organiser-apk
          path: bin/*.apk